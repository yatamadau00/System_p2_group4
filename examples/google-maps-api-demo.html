<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Maps API Demo</title>
    <style>
      :root {
        color: #202124;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8fafd;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) auto auto;
        gap: 8px;
        align-items: center;
        padding: 12px;
        background: #fff;
        border-bottom: 1px solid #dadce0;
      }

      input,
      button {
        min-height: 40px;
        border-radius: 6px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid #dadce0;
        padding: 0 12px;
      }

      button {
        border: 0;
        padding: 0 14px;
        color: #fff;
        background: #1a73e8;
        cursor: pointer;
      }

      button.secondary {
        color: #1a73e8;
        background: #e8f0fe;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      #status {
        padding: 10px 12px;
        min-height: 42px;
        color: #3c4043;
        background: #fff;
        border-bottom: 1px solid #dadce0;
      }

      #map {
        width: 100vw;
        height: calc(100vh - 107px);
      }

      @media (max-width: 760px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        #map {
          height: calc(100vh - 239px);
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <input id="apiKey" type="password" placeholder="Google Maps API key" autocomplete="off" />
      <input id="placeInput" value="京都大学 吉田キャンパス" />
      <button id="loadButton">地図を読み込む</button>
      <button id="searchButton" class="secondary" disabled>検索</button>
    </div>
    <div id="status">API キーを入力して「地図を読み込む」を押してください。</div>
    <div id="map"></div>

    <script>
      const defaultCenter = { lat: 35.0262, lng: 135.7808 };
      const statusElement = document.querySelector("#status");
      const apiKeyInput = document.querySelector("#apiKey");
      const placeInput = document.querySelector("#placeInput");
      const loadButton = document.querySelector("#loadButton");
      const searchButton = document.querySelector("#searchButton");

      let map;
      let marker;
      let geocoder;

      function setStatus(message) {
        statusElement.textContent = message;
      }

      function authFailureMessage() {
        const origin = location.protocol === "file:" ? "file:// で開いています" : `origin: ${location.origin}`;

        return [
          "Google Maps の認証に失敗しました。",
          "Maps JavaScript API の有効化、請求先アカウント、API キー制限を確認してください。",
          `${origin}。HTTP リファラー制限を使う場合は http://localhost:8000/* などを許可して localhost で開くのが安全です。`,
        ].join(" ");
      }

      window.gm_authFailure = () => {
        loadButton.disabled = false;
        searchButton.disabled = true;
        setStatus(authFailureMessage());
      };

      function loadGoogleMaps(apiKey) {
        return new Promise((resolve, reject) => {
          if (window.google?.maps) {
            resolve();
            return;
          }

          window.initGoogleMapsDemo = resolve;

          const script = document.createElement("script");
          script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(
            apiKey,
          )}&callback=initGoogleMapsDemo&language=ja&region=JP&loading=async`;
          script.async = true;
          script.onerror = () => reject(new Error("Google Maps JavaScript API の読み込みに失敗しました。"));
          document.head.append(script);
        });
      }

      function initMap() {
        map = new google.maps.Map(document.querySelector("#map"), {
          center: defaultCenter,
          zoom: 16,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true,
        });

        marker = new google.maps.Marker({
          map,
          position: defaultCenter,
          title: "京都大学 吉田キャンパス",
        });

        geocoder = new google.maps.Geocoder();
        searchButton.disabled = false;
        setStatus("地図を表示しました。検索すると Geocoding API で住所/施設名を緯度経度に変換します。");
      }

      async function searchPlace() {
        const address = placeInput.value.trim();
        if (!address || !geocoder) return;

        searchButton.disabled = true;
        setStatus(`検索中: ${address}`);

        try {
          const response = await geocoder.geocode({ address });
          const result = response.results[0];

          if (!result) {
            setStatus("見つかりませんでした。別の住所や施設名で試してください。");
            return;
          }

          const location = result.geometry.location;
          const position = { lat: location.lat(), lng: location.lng() };

          map.setCenter(position);
          map.setZoom(17);
          marker.setPosition(position);
          marker.setTitle(result.formatted_address);
          setStatus(`${result.formatted_address} / lat: ${position.lat.toFixed(6)}, lng: ${position.lng.toFixed(6)}`);
        } catch (error) {
          setStatus(error.message || "検索に失敗しました。API キーや有効化済み API を確認してください。");
        } finally {
          searchButton.disabled = false;
        }
      }

      loadButton.addEventListener("click", async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          setStatus("Google Cloud Console で発行した API キーを入力してください。");
          return;
        }

        loadButton.disabled = true;
        const fileHint =
          location.protocol === "file:"
            ? " file:// で開いているため、キー制限がある場合は localhost で開いてください。"
            : "";
        setStatus(`Google Maps JavaScript API を読み込んでいます...${fileHint}`);

        try {
          await loadGoogleMaps(apiKey);
          initMap();
        } catch (error) {
          loadButton.disabled = false;
          setStatus(error.message);
        }
      });

      searchButton.addEventListener("click", searchPlace);
      placeInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !searchButton.disabled) {
          searchPlace();
        }
      });
    </script>
  </body>
</html>
